# Server
server.port=8080

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/alumni_link
spring.datasource.username=postgres
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway (DB migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
app.otp.ttl-minutes=5
app.otp.expose-dev-code=true

# JWT Configuration
app.jwt.secret=your-256-bit-secret-key-replace-in-production-use-strong-random-value
app.jwt.expiration-ms=86400000
app.google.client-id=

# CORS - allow frontend (local dev)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

# Logging
logging.level.com.alumnilink=INFO
logging.level.org.springframework.security=INFO

# Resume uploads (job referral requests)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mentorship notifications
app.notifications.email.enabled=false
app.notifications.email.from=no-reply@alumnilink.local

# Configure standard Spring Boot mail properties to actually send email:

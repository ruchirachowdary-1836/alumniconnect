# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

app.notifications.sms.enabled=false
app.notifications.sms.api-url=
app.notifications.sms.auth-type=none
app.notifications.sms.auth-username=
app.notifications.sms.auth-password=
app.notifications.sms.bearer-token=
app.notifications.sms.from=

